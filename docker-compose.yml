services:
  task_agents_db:
    container_name: task_agents_db
    image: postgres:16-alpine
    ports:
      - "5491:5432"
    environment:
      POSTGRES_USER: taskagents
      POSTGRES_PASSWORD: taskagents
      POSTGRES_DB: taskagents
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskagents"]
      interval: 2s
      timeout: 3s
      retries: 10

  task_agents_api:
    container_name: task_agents_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8890:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://taskagents:taskagents@db:5432/taskagents
      - DEV=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./workspace:/workspace
      - ./backend:/app
      - ./cli:/cli
    depends_on:
      task_agents_db:
        condition: service_healthy

  task_agents_web:
    container_name: task_agents_web
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8891:3000"
    environment:
      - VITE_API_URL=http://localhost:8890
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - task_agents_api

  task_agents_cloud:
    container_name: task_agents_cloud
    build:
      context: ./cloud
      dockerfile: Dockerfile
    env_file:
      - .env
    working_dir: /workspace/cloud/cli
    volumes:
      - ./cloud:/workspace/cloud
      - ./backend:/workspace/backend:ro
      - ./frontend:/workspace/frontend:ro

volumes:
  pgdata:
