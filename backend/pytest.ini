[pytest]
# Quiet the pytest-asyncio config warning by pinning fixture scope.
asyncio_default_fixture_loop_scope = function

# Test category vocabulary. Every test should carry at least one of these.
# Use module-level `pytestmark = [pytest.mark.X]` for common labels and
# per-test `@pytest.mark.Y` for distinguishing ones. Filter with `pytest -m`.
markers =
    unit: pure function tests with no I/O, no app, no mocks
    integration: hits the FastAPI app via TestClient
    regression: locks in a previously fixed bug or known attack
    security: validates an auth or security defense
    slow: takes >1s — skip in fast CI runs
    db: requires a live Postgres connection

# Silence noisy third-party deprecation warnings that aren't ours to fix.
# `error::UserWarning` would be the strict route once the suite is mature.
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio
    ignore::DeprecationWarning:starlette
    ignore::DeprecationWarning:fastapi
    ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning
    ignore:.*asyncio\.get_event_loop_policy.*:DeprecationWarning
    ignore:.*Setting per-request cookies.*:DeprecationWarning
